services:
  lt-sync:
    build: .
    image: linear-ticktick-sync:latest
    restart: unless-stopped
    # Env vars come from Coolify (or `docker compose --env-file .env up`).
    environment:
      # Coolify magic var — generates Traefik labels for service `lt-sync` on port 8000.
      SERVICE_FQDN_LT_SYNC_8000: ${SERVICE_FQDN_LT_SYNC_8000}
      DATABASE_URL: sqlite+aiosqlite:////data/state.db
      LINEAR_API_KEY: ${LINEAR_API_KEY}
      LINEAR_TEAM_KEY: ${LINEAR_TEAM_KEY:-HMC}
      LINEAR_PROJECT_NAME: ${LINEAR_PROJECT_NAME:-hm}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET}
      TICKTICK_CLIENT_ID: ${TICKTICK_CLIENT_ID}
      TICKTICK_CLIENT_SECRET: ${TICKTICK_CLIENT_SECRET}
      TICKTICK_REDIRECT_URI: ${TICKTICK_REDIRECT_URI}
      TICKTICK_LIST_ID: ${TICKTICK_LIST_ID:-69cd04eb8f088eaeff7fb755}
      TICKTICK_DEFAULT_TZ: ${TICKTICK_DEFAULT_TZ:-Europe/Moscow}
      # JSON list of {team_key, ticktick_list_id, project_name?}; empty → legacy single pair.
      SYNC_PAIRS: ${SYNC_PAIRS:-}
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN:-}
      PUSHOVER_USER: ${PUSHOVER_USER:-}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-180}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    expose:
      - "8000"
    volumes:
      - lt-sync-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as r; r.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lt-sync-data:
